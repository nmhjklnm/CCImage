# Linux 推荐：host 网络 + sing-box TUN，避免桥接下默认路由仍走 eth0 导致「半直连」泄漏。
services:
  ccimage:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_TAG: ${NODE_TAG:-lts-bookworm}
        PROXY_HOST: ${PROXY_HOST}
        PROXY_PORT: ${PROXY_PORT}
        PROXY_USER: ${PROXY_USER}
        PROXY_PASS: ${PROXY_PASS}
    image: ccimage:latest
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      PROXY_HOST: ${PROXY_HOST}
      PROXY_PORT: ${PROXY_PORT}
      PROXY_USER: ${PROXY_USER}
      PROXY_PASS: ${PROXY_PASS}
      SINGBOX_ENABLE: ${SINGBOX_ENABLE:-1}
    stdin_open: true
    tty: true
