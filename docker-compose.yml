# Three network modes via NETWORK_MODE in .env:
#   bridge  (default) — container isolated, but host TUN/VPN may affect outbound
#   macvlan           — container bypasses host network stack entirely (recommended)
#   host              — container shares host network (TUN affects entire host)
services:
  ccimage:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_TAG: ${NODE_TAG:-lts-bookworm}
        PROXY_HOST: ${PROXY_HOST:-}
        PROXY_PORT: ${PROXY_PORT:-}
        PROXY_USER: ${PROXY_USER:-}
        PROXY_PASS: ${PROXY_PASS:-}
    image: ccimage:latest
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      PROXY_URI: ${PROXY_URI:-}
      PROXY_HOST: ${PROXY_HOST:-}
      PROXY_PORT: ${PROXY_PORT:-}
      PROXY_USER: ${PROXY_USER:-}
      PROXY_PASS: ${PROXY_PASS:-}
      SINGBOX_ENABLE: ${SINGBOX_ENABLE:-1}
      DNS_SERVER: ${DNS_SERVER:-tls://1.1.1.1}
      TUN_ADDRESS: ${TUN_ADDRESS:-172.19.0.1/30}
      TUN_MTU: ${TUN_MTU:-9000}
      DISABLE_IPV6: ${DISABLE_IPV6:-1}
      HEALTHCHECK: ${HEALTHCHECK:-1}
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "timeout 5 bash -c 'echo >/dev/tcp/google.com/443' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
